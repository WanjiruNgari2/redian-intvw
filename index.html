<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width ,initial-scale = 1.0">
    <meta charset="UTF-8">
    <meta name="description"
        content="This is a currency converter app that checks currency input and converts it to desired any currency" />
    <title> Currency Converter </title>
    <link rel="stylesheet" href="index.css">
</head>


<body>
    <div id="main">
        <h1>Welcome to Currency Converter App. </h1>

        <div class="input-section">
            <label for="amount">Amount: </label>
            <input type="number" id="amount" placeholder="Enter amount">
        </div> <br>

        <div class="from-section">
            <label for="startingCurrency">From: </label>
            <input type="text" id="startingCurrency" placeholder="e.g USD">
            <br> <br> <br> <br>
            <label for="targetCurrency">To:</label>
            <input type="text" id="targetCurrency" placeholder="e.g  KES">
            <br> <br> <br> <br>
            <button id="convertBtn">Convert</button>

        </div>

        <div id="output-section">
            <h2>Result: </h2>
            <p id="result">---</p>
        </div>

        <div id="history-section">
            <h2>History: </h2>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Time</th>
                        <th>Amount From</th>
                        <th>→</th>
                        <th>Converted To</th>
                        <th>Rate</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- rows to be added here by JS -->
                </tbody>
            </table>
            <button id="historyBtn">Refresh History</button>

        </div>

    </div>
    <script defer type="module" src="index.js"> </script>
</body>

</html>
