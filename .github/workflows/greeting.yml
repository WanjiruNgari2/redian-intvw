name: Greeting Message

on:
  push:
    branches: [ main ]

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print a greeting
        run: echo "Hello from GitHub Actions!"

      - name: Print Current Time
        run: date

      - name: Print runner info
        run: |
          echo "Running on ${{ runner.os }}"
          echo "GitHub actor: ${{ github.actor }}"
          